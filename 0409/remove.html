<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .negrito {
            font-weight: bold;
        }
        .text-blue {
            color: blue;
        }
    </style>
    <script>
        function clique() {
            let element = document.querySelector("#paragrafo")
            element.remove()
        }
    </script>
</head>
<body>
    <p id="paragrafo">Parágrafo a ser apagado</p>
    <p>Parágrafo</p>
    <p>Parágrafo qualquer</p>
    <button onclick="clique()">Ok</button>
</body>
</html>
