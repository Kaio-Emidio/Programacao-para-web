<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function clique() {
            let titulo = document.createElement('h1')
            titulo.innerHTML = "Programação para interntet"
            let div = document.querySelector("#div1")
            div.appendChild(titulo)
        }
    </script>
</head>
<body>
    <div id="div1"></div>
    <button onclick="clique()">OK</button>
</body>
</html>
