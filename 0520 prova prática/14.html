<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 14</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        function aumentar() {
            let cliques = $("#numero").text()
            cliques = parseInt(cliques)
            cliques = cliques + 1
            console.log(cliques)
            $("#numero").text(cliques)
        }
    </script>
</head>
<body>
    <input type="button" value="Clique aqui" onclick="aumentar()">
    <h1>Cliques Realizados: <span id="numero">0</span></h1>
</body>
</html>
